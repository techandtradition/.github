name: Feature request
description: Suggest an idea for this project
title: "[Feature]: "
labels: ["enhancement"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to suggest a feature! Please fill out the details below.

  - type: input
    id: summary
    attributes:
      label: Feature Summary
      description: Briefly describe the feature you’d like to see.
      placeholder: "Add dark mode support"

  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: Why do you need this feature? What problem does it solve?
      placeholder: "It would reduce eye strain during night use."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How would you like this feature to work?
      placeholder: "Add a toggle in settings to enable dark mode."

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives
      description: Have you considered other solutions or workarounds?
      placeholder: "Using browser extensions for dark mode."

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      description: How important is this feature to you?
      options:
        - Low
        - Medium
        - High
